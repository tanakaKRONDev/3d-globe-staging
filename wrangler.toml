name = "3d-globe-landing-page"
compatibility_date = "2024-01-01"
main = "worker.js"

[env.production]
account_id = ""  # Add your Cloudflare account ID here

# Static assets (Worker serves these; auth runs first)
[assets]
directory = "dist"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

# Static site configuration (for Pages builds)
pages_build_output_dir = "dist"

# Build configuration
[build]
command = "npm run build"
cwd = "."

# Static assets configuration
[[rules]]
type = "Text"
globs = ["**/*.html", "**/*.txt"]

[[rules]]
type = "Data"
globs = ["**/*"]