name = "3d-globe-landing-page"
main = "worker.js"
compatibility_date = "2024-01-01"

# Secrets (set via: wrangler secret put <NAME>)
# - SITE_PASSWORD: HTTP Basic Auth for the site
# - ADMIN_PASSWORD: admin API login; required for POST /api/admin/login and /api/admin/*

# -------------------------
# D1 (Tour Stops Database)
# -------------------------
# Create it with:
#   npx wrangler d1 create db
# Then paste the database_id below.
[[d1_databases]]
binding = "DB"
database_name = "db"
# database_id = "ab55959b-9283-4377-9afc-346231547873"
database_id = "976cf376-3db0-4c28-b05a-493c8a89406f"
migrations_dir = "migrations"

# -------------------------
# Static Assets (Vite build output)
# -------------------------
[assets]
directory = "dist"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

# -------------------------
# Build configuration
# -------------------------
[build]
command = "npm run build"
cwd = "."

# -------------------------
# Asset rules (optional)
# -------------------------
[[rules]]
type = "Text"
globs = ["**/*.html", "**/*.txt"]

[[rules]]
type = "Data"
globs = ["**/*"]